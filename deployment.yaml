apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-matcher-deploy
spec:
  replicas: 1  # Start with one instance
  selector:
    matchLabels:
      app: resume-matcher
  template:
    metadata:
      labels:
        app: resume-matcher
    spec:
      containers:
      - name: matcher
        image: resume-matcher-v1
        imagePullPolicy: Never # Critical: Tells K8s to use the image you loaded
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "800m"      # Minimum 0.1 CPU
            memory: "1Gi"
          limits:
            cpu: "2000m"      # Maximum 0.5 CPU (The "Throttling" test)
            memory: "2Gi" 
---
apiVersion: v1
kind: Service
metadata:
  name: resume-matcher-service
spec:
  type: NodePort
  selector:
    app: resume-matcher
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30001 # This is the "Door" into your cluster